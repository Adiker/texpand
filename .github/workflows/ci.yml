name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needed on:"; echo "$out"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: tests
        run: go test ./...
      - name: tests (race)
        run: go test -race ./...
